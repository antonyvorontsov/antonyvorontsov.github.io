# No baseURL here on purpose: the only place the production domain is allowed
# to appear in this repo is static/CNAME (how GitHub Pages custom domains
# work). CI always passes the real one explicitly via
# `hugo --baseURL "${{ steps.pages.outputs.base_url }}/"` (see
# .github/workflows/hugo.yml). Leaving this unset means `hugo server` and a
# plain local `hugo` build both default to a harmless localhost baseURL
# instead of silently linking out to production.
uglyURLs = true
relativeURLs = true
defaultContentLanguage = "ru"
# false: Russian (default language) is unprefixed at the root (/, /about.html,
# /posts/<slug>.html); English gets the /en/ prefix. This is also what avoids
# a real Hugo defect — with defaultContentLanguageInSubdir=true + uglyURLs=true,
# Hugo's automatic root-redirect stub and the real default-language home page
# collide on the same output path (ru/index.html) and the stub silently
# clobbers the real page (see gohugoio/hugo PR #6138, proposed fix never
# merged). Keeping the default language unprefixed sidesteps the whole
# mechanism — there's no cross-language root redirect to generate.
defaultContentLanguageInSubdir = false

# Individual tag pages (kind "term", e.g. /tags/cqrs.html) are enabled and
# rendered by layouts/tags/term.html. The site-wide "all tags" overview page
# (kind "taxonomy", e.g. /tags.html) stays disabled — it's not part of the UI,
# only per-tag term pages are.
disableKinds = ["taxonomy"]

[taxonomies]
  tag = "tags"

# Term pages (individual tag pages) only need HTML — without this, Hugo's
# default output formats also emit an RSS feed per tag (/tags/<tag>/index.xml)
# that nothing links to or needs, mirroring the outputs: [html] restriction
# already used on content/posts/_index.*.md for the same reason.
[outputs]
  term = ["html"]

[markup.goldmark.renderer]
  unsafe = true

[markup.goldmark.parser.attribute]
  title = true

# Chroma emits the same token class names (.kn, .s, .c1, ...) regardless of
# `style` - the style only changes color values, which we override ourselves
# via hand-written CSS (static/css/styles.css, GitHub Light/Dark rules scoped
# by [data-theme]). noClasses=false is already Hugo's default; set explicitly
# so the class-based-output decision is visible here, not just implied.
[markup.highlight]
  noClasses = false

[params]
  profileTitle = "Software Engineering Manager / Tech Lead"
  # Giscus (GitHub Discussions comments, see ADR-9 and specs/components/comments.md).
  # Only the non-sensitive identifiers live here; giscusRepoId/giscusDefaultCategoryId
  # are opaque GraphQL node IDs and come ONLY from CI via HUGO_PARAMS_GISCUSREPOID /
  # HUGO_PARAMS_GISCUSDEFAULTCATEGORYID env vars (.github/workflows/hugo.yml) — never
  # set here, so local `hugo server` and PR-check builds render comments as a no-op.
  giscusRepo = "antonyvorontsov/antonyvorontsov.github.io"
  giscusDefaultCategory = "General"

# Site-wide search index (see layouts/index.searchindex.json): one JSON file
# per language, listing every searchable page (home, about, posts list,
# individual posts) in that language's own site. baseName keeps it out of the
# way of the real index.html.
[outputFormats.searchindex]
  mediaType = "application/json"
  baseName = "search-index"
  isPlainText = true
  notAlternative = true

