{{- if not (findRE "^[a-z0-9]+(-[a-z0-9]+)*$" .Anchor) -}}
  {{- errorf "heading %q in %s has no explicit ASCII {#slug} anchor (got #%s) — Goldmark's auto-generated id breaks the JS scrollspy on non-ASCII headings" .Text .Page.File.Path .Anchor -}}
{{- end -}}
<h{{ .Level }} id="{{ .Anchor }}">{{ .Text }}</h{{ .Level }}>
