{{ $isPostSingle := .Scratch.Get "isPostSingle" }}
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ .Title }}{{ if $isPostSingle }} — Блог Антона Воронцова{{ end }}</title>
<meta name="description" content="{{ .Params.description }}">
<link rel="icon" type="image/png" href="{{ "assets/favicon.png" | relURL }}">

{{ if not $isPostSingle }}
<!-- SEO Open Graph -->
<meta property="og:title" content="{{ .Title }}">
<meta property="og:description" content="{{ .Params.og_description | default .Params.description }}">
<meta property="og:type" content="{{ .Params.og_type | default "website" }}">
<meta property="og:url" content="{{ .Permalink }}">
{{ end }}

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ "css/styles.css" | relURL }}">
