{{/* Self-wraps in <span class="post-date"> so .post-meta can force it onto
     its own line via flex-basis. Unlike archive-date.html, callers don't
     wrap this partial's output themselves. */}}
{{- if eq .Language.Lang "ru" -}}
<span class="post-date">{{ partial "date-ru.html" .Date }}</span>
{{- else -}}
<span class="post-date">{{ .Date.Format "January 2, 2006" }}</span>
{{- end -}}
