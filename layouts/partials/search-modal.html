<!-- Search overlay: opened by #search-btn (header.html), driven by static/js/modules/search.js -->
<div class="search-overlay" id="search-overlay" hidden>
  <div class="search-panel" role="dialog" aria-modal="true" aria-label="{{ i18n "searchAria" }}">
    <div class="search-input-row">
      <svg class="search-icon" viewBox="0 0 24 24">
        <path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
      </svg>
      <input type="text" id="search-input" class="search-input" placeholder="{{ i18n "searchPlaceholder" }}" autocomplete="off" spellcheck="false">
      <button type="button" id="search-close" class="search-close" aria-label="{{ i18n "searchCloseAria" }}">&times;</button>
    </div>
    <div class="search-results" id="search-results" data-no-results-text="{{ i18n "searchNoResults" }}"></div>
  </div>
</div>
