{{ define "main" }}
<header class="profile-header">
  <h1 class="profile-name">
    <span class="lang-ru">Архив постов</span>
    <span class="lang-en">Posts Archive</span>
  </h1>
</header>

{{ range .Pages.GroupByPublishDate "2006" }}
<div class="archive-year-group">
  <h2 class="archive-year">{{ .Key }}</h2>
  <div class="archive-list">
    {{ range .Pages }}
    <div class="archive-item">
      <span class="archive-date">
        <span class="lang-ru">{{ .Date.Format "02.01.2006" }}</span>
        <span class="lang-en">{{ .Date.Format "Jan 2, 2006" }}</span>
      </span>
      <a href="{{ .RelPermalink }}" class="archive-link">
        <span class="lang-ru">{{ .Title }}</span>
        <span class="lang-en">{{ .Params.title_en | default .Title }}</span>
      </a>
    </div>
    {{ end }}
  </div>
</div>
{{ end }}
{{ end }}
